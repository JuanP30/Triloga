<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso | Triloga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: var(--bg-color);
    "
  >
    <div
      class="card"
      style="text-align: center; padding: 3rem; max-width: 400px; width: 100%"
    >
      <div style="margin-bottom: 2rem">
        <i
          class="fa-solid fa-hotel"
          style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem"
        ></i>
        <h1
          style="font-size: 1.8rem; font-weight: 800; color: var(--text-dark)"
        >
          Triloga
        </h1>
        <p style="color: var(--text-muted); font-size: 0.9rem">
          Seleccione su perfil de acceso
        </p>
      </div>
      <div style="display: flex; flex-direction: column; gap: 1rem">
        <button
          id="btn-login-admin"
          class="btn btn-primary"
          style="justify-content: center; padding: 1rem; border: none; cursor: pointer"
        >
          <i class="fa-solid fa-user-shield"></i> Entrar como Administrador
        </button>
        <button
          id="btn-login-staff"
          class="btn btn-outline"
          style="justify-content: center; padding: 1rem; border: 1px solid var(--primary, #000); background: transparent; cursor: pointer"
        >
          <i class="fa-solid fa-user-tie"></i> Entrar como Staff
        </button>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
