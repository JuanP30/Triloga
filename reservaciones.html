<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas | Triloga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-hotel"></i>
            <span>Triloga</span>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="staff_dashboard.html" class="nav-link">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="huespedes.html" class="nav-link">
                    <i class="fa-solid fa-users"></i>
                    <span>Huéspedes</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="reservaciones.html" class="nav-link active">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Reservas</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="disponibilidad.html" class="nav-link">
                    <i class="fa-solid fa-check-to-slot"></i>
                    <span>Disponibilidad</span>
                </a>
            </li>
            <li class="nav-item" style="margin-top: auto; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 1rem;">
                <a href="index.html" class="nav-link" style="color: var(--danger);">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Cerrar Sesión</span>
                </a>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">Gestión de Reservas</h1>
            <a href="#newReservationModal" class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> Nueva Reserva
            </a>
        </header>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Todas las Reservas</h2>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID Reserva</th>
                            <th>Huésped</th>
                            <th>Habitación</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Costo Total</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="newReservationModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="card-title">Crear Reserva</h3>
                <a href="#" class="close-btn">&times;</a>
            </div>
            <div class="modal-body">
                <form>
                    <div class="form-group">
                        <label class="form-label">Huésped</label>
                        <select class="form-control" required>
                            <option value="">Seleccione Huésped (1 - Juan Pérez)</option>
                            <option value="1">1 - Juan Pérez</option>
                            <option value="2">2 - María Gómez</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Habitación (Buscar Disponibles)</label>
                        <select class="form-control" required>
                            <option value="">Seleccione Habitación (101 - Sencilla)</option>
                            <option value="101">101 - Sencilla ($ 150.000 / noche)</option>
                            <option value="205">205 - Suite ($ 450.000 / noche)</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Fecha Check-in</label>
                            <input type="date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fecha Check-out</label>
                            <input type="date" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Costo Total Estimado</label>
                        <div style="font-size: 1.5rem; font-weight: 700; color: var(--primary)">$ 0 COP</div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <a href="#" class="btn btn-outline">Cancelar</a>
                <a href="#" class="btn btn-primary"><i class="fa-solid fa-calendar-plus"></i> Crear Reserva</a>
            </div>
            </div>
        </div>
    </div>
  <script src="js/main.js"></script>
  </body>
</html>
